<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CHÚC MỪNG XINH EM MUỘN NHA</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Thay nền đen bằng hình ảnh hoa anh đào lãng mạn */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                            url('https://images.unsplash.com/photo-1522383225653-ed111181a951?q=80&w=2076&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            perspective: 1200px;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
}

        #heartCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        #music-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        .overlay-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            color: #333;
            box-shadow: 0 0 30px rgba(255, 50, 100, 0.3);
            max-width: 400px;
        }

        .overlay-card h2 { margin-bottom: 20px; font-size: 22px; color: #d63384; }
        .overlay-card p { margin-bottom: 25px; color: #666; font-style: italic; }

        #birthdayInput {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ff6b81;
            outline: none;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            width: 80%;
            font-family: inherit;
        }
        #error-msg {
            color: #ff4757;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }

        .btn-music {
            padding: 12px 35px;
            margin: 0 10px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-yes { background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; }
        .btn-music:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .globe-container {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            animation: rotateGlobe 30s linear infinite;
            display: none;
            z-index: 2;
        }

        /* --- PHẦN CHỈNH SỬA TRÁI TIM TO CHÍNH GIỮA --- */
        .main-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 180px; /* Độ to của trái tim */
            color: #ff4757;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
            z-index: 1;
            user-select: none;
        }

        .photo {
            position: absolute;
            width: 110px;
            height: 140px;
            top: 50%;
            left: 50%;
            margin-top: -70px;
            margin-left: -55px;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            object-fit: cover;
            border-radius: 5px;
            z-index: 10;
        }

        @keyframes rotateGlobe {
            from { transform: rotateY(0deg) rotateX(10deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        .p1 { transform: rotateY(0deg) translateZ(320px); }
        .p2 { transform: rotateY(60deg) translateZ(320px); }
        .p3 { transform: rotateY(120deg) translateZ(320px); }
        .p4 { transform: rotateY(180deg) translateZ(320px); }
        .p5 { transform: rotateY(240deg) translateZ(320px); }
        .p6 { transform: rotateY(300deg) translateZ(320px); }

        #birthdayInput::placeholder {
            text-align: center;
            width: 100%;
        }
        .top-left-text {
        position: fixed;
        top: 20px;       /* Cách mép trên 20px */
        left: 20px;      /* Cách mép trái 20px */
        color: white;    /* Màu chữ */
        font-size: 24px; /* Kích thước chữ */
        font-weight: bold;
        z-index: 9999;   /* Luôn nằm trên cùng */
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* Đổ bóng để dễ đọc trên nền ảnh */
        pointer-events: none; /* Không làm vướng khi click chuột */
        font-family: 'Segoe UI', Arial, sans-serif;
}
    </style>
</head>
<body>
    <div class="top-left-text">Mãi yêu Bảo Thy Hết cuộc đời❤️</div>

    <canvas id="heartCanvas"></canvas>

    <div id="music-overlay">
        <div class="overlay-card">
            <h2>Xác nhận danh tính ❤️</h2>
            <p>Nhập đúng ngày sinh của cậu để mở khóa món quà này nhé!</p>
            
            <input type="text" id="birthdayInput" placeholder="Hãy nhập ngày sinh của bạn" maxlength="10">
            <div id="error-msg">Ngày sinh chưa đúng rồi, thử lại nhé!</div>
            
            <button class="btn-music btn-yes" onclick="checkAccess()">Vào xem ngay</button>
        </div>
    </div>

    <div class="globe-container" id="globe">
        <div class="main-heart">❤️</div>
        
        <img src="anh1.jpg" class="photo p1">
        <img src="anh2.jpg" class="photo p2">
        <img src="anh3.jpg" class="photo p3">
        <img src="anh4.jpg" class="photo p4">
        <img src="anh5.jpg" class="photo p5">
        <img src="anh6.jpg" class="photo p6">
    </div>

    <audio id="myAudio"></audio>

    <script>
        const targetDate = "17/04/2010"; 

        function checkAccess() {
            const userInput = document.getElementById('birthdayInput').value;
            const errorMsg = document.getElementById('error-msg');

            if (userInput === targetDate) {
                startEverything(true);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Ngày sinh chưa đúng (VD: " + targetDate + ")";
                document.querySelector('.overlay-card').animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 300 });
            }
        }

        document.getElementById('birthdayInput').addEventListener('input', function (e) {
            let v = this.value.replace(/\D/g, '').slice(0, 8);
            if (v.length >= 5) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
            else if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
            this.value = v;
        });

        const playlist = ["nhac2.mp3"];
        let currentSongIndex = 0;
        const audio = document.getElementById('myAudio');
        const loverName = "Bảo Thy"; 

        function startEverything(allowMusic) {
    document.getElementById('music-overlay').style.display = 'none';
    document.getElementById('globe').style.display = 'block';
    initHearts(); 
    
    if (allowMusic) {
        // Thêm dòng này để ép trình duyệt nhận diện tương tác người dùng
        audio.play().then(() => {
            console.log("Nhạc đang phát...");
        }).catch(e => {
            console.log("Trình duyệt vẫn chặn, cần click thêm lần nữa!");
            // Nếu vẫn lỗi, thử gọi lại hàm playPlaylist
            playPlaylist();
        });
    }
}

        function playPlaylist() {
            audio.src = playlist[currentSongIndex];
            audio.play().catch(e => console.log("Thiếu file nhạc!"));
            audio.onended = function() {
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
                playPlaylist();
            };
        }

        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        function initHearts() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 50; i++) { hearts.push(new Heart()); }
            animate();
        }

        class Heart {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 15 + 12;
                this.speed = Math.random() * 2 + 1;
                this.text = Math.random() > 0.5 ? "❤️" : loverName;
                this.opacity = Math.random() * 0.6 + 0.3;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 71, 87, ${this.opacity})`;
                ctx.font = `bold ${this.size}px Arial`;
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
